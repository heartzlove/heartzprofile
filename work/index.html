<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업보 · 하츠</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/op/ophillia/ophillia.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .upbo-head{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:6px; }
    .upbo-eyebrow{ font-size:12px; letter-spacing:3px; color:var(--main-dark); font-weight:800; }
    .upbo-title{ font-family:var(--body); font-weight:800; font-size:30px; color:var(--main-dark); letter-spacing:-0.5px;
      background:linear-gradient(135deg,var(--main-dark),var(--accent));
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .upbo-update{ font-size:12px; color:var(--text-soft); background:var(--card); border:1px solid var(--line);
      padding:6px 14px; border-radius:999px; }
    .search-box{ width:100%; padding:13px 18px; border-radius:999px; border:1.5px solid var(--line); font-size:14px;
      outline:none; background:var(--card); color:var(--text); margin:14px 0 18px; transition:border-color .16s ease; }
    .search-box:focus{ border-color:var(--main); }

    .viewer-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    @media (max-width:680px){ .viewer-grid{ grid-template-columns:repeat(2,1fr); gap:9px; } }
    @media (max-width:380px){ .viewer-grid{ gap:8px; } .viewer-card{ padding:14px 8px; } .viewer-av,.viewer-av-fb{ width:52px; height:52px; } }
    .viewer-card{ background:var(--card); border:1.5px solid var(--line); border-radius:18px; padding:20px 14px;
      text-align:center; cursor:pointer; transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
    .viewer-card:hover{ transform:translateY(-3px); box-shadow:0 12px 26px rgba(120,150,250,.2); border-color:var(--main); }
    .viewer-av{ width:62px; height:62px; border-radius:50%; object-fit:cover; margin:0 auto 10px; display:block;
      border:3px solid var(--main-light); background:var(--main-light); }
    .viewer-av-fb{ width:62px; height:62px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center;
      justify-content:center; background:linear-gradient(135deg,var(--main),var(--accent)); color:#fff; font-size:24px;
      font-weight:800; border:3px solid var(--main-light); }
    .viewer-nick{ font-size:14px; font-weight:700; color:var(--text); }
    .viewer-id{ font-size:11px; color:var(--text-soft); margin:2px 0 8px; }
    .viewer-total{ display:inline-block; background:linear-gradient(135deg,var(--main),var(--main-dark)); color:#fff;
      border-radius:999px; padding:4px 14px; font-size:12px; font-weight:800; box-shadow:0 4px 10px rgba(120,150,250,.4); }

    .ov{ position:absolute; left:0; right:0; background:rgba(30,40,70,.4); display:none; align-items:flex-start;
      justify-content:center; z-index:500; padding:16px; }
    .ov.show{ display:flex; }
    .modal{ background:var(--card); border-radius:22px; width:100%; max-width:420px; max-height:84vh; display:flex;
      flex-direction:column; overflow:hidden; box-shadow:0 20px 60px rgba(60,80,160,.3); animation:pop .22s ease; }
    @keyframes pop{ from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-top{ display:flex; align-items:center; gap:12px; padding:20px 22px 16px; border-bottom:1px solid var(--line); position:relative; }
    .modal-av{ width:52px; height:52px; border-radius:50%; object-fit:cover; border:3px solid var(--main-light); background:var(--main-light); flex-shrink:0; }
    .modal-av-fb{ width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,var(--main),var(--accent)); color:#fff; font-size:20px; font-weight:800;
      border:3px solid var(--main-light); flex-shrink:0; }
    .modal-nick{ font-size:18px; font-weight:800; color:var(--main-dark); line-height:1.2; }
    .modal-id{ font-size:12px; color:var(--text-soft); }
    .modal-x{ position:absolute; top:16px; right:18px; background:none; border:none; font-size:22px; color:var(--text-soft); cursor:pointer; line-height:1; }
    .modal-body{ padding:14px 18px 20px; overflow-y:auto; }
    .upbo-row{ display:flex; align-items:center; gap:10px; padding:11px 14px; margin-bottom:7px; background:var(--main-light);
      border:1px solid var(--line); border-radius:12px; }
    .upbo-row .nm{ flex:1; font-size:14px; color:var(--text); font-weight:600; }
    .upbo-row .evt{ font-size:10px; font-weight:800; color:#b07d18; background:#fff0cc; padding:2px 9px; border-radius:999px; }
    body.dark .upbo-row .evt{ background:#3a300f; color:#e0b652; }
    .upbo-row .ct{ font-size:13px; font-weight:800; color:var(--main-dark); background:var(--card); border:1.5px solid var(--line);
      border-radius:999px; padding:3px 12px; min-width:42px; text-align:center; }
    .modal-empty{ text-align:center; color:var(--text-soft); padding:30px; font-size:14px; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-links">
        <a class="navpill" href="../index.html">프로필</a>
        <a class="navpill" href="../schedule/">일정</a>
        <a class="navpill active" href="index.html">업보</a>
      </div>
      <button class="theme-switch" id="themeSwitch" type="button" aria-label="다크모드 전환">🌙</button>
    </div>
  </nav>

  <main class="wrap stagger">
    <section class="card" style="position:relative">
      <button class="inquiry-btn" type="button" onclick="openInquiry()">✉️ 문의</button>
      <div class="upbo-head">
        <div>
          <div class="upbo-eyebrow">UPBO</div>
          <div class="upbo-title">업보 현황</div>
        </div>
        <span class="upbo-update" id="update-date"></span>
      </div>
      <input class="search-box" id="search" placeholder="🔍 닉네임 또는 아이디 검색...">
      <div class="viewer-grid" id="grid"></div>
    </section>

    <footer class="foot">
      <div class="foot-copy" id="foot-copy">© 2026 하츠 Official.</div>
      <div class="foot-biz" id="foot-biz">비즈니스 문의 · heartzstar87@gmail.com</div>
    </footer>
  </main>

  <!-- 문의 모달 -->
  <div class="iq-ov" id="iq-ov" onclick="if(event.target===this)closeInquiry()">
    <div class="iq-modal">
      <div class="iq-title">✉️ 문의하기</div>
      <div class="iq-desc">업보 정정 요청이나 하고 싶은 말을 남겨주세요 🤍</div>
      <input class="iq-input" id="iq-nick" placeholder="닉네임 (필수)">
      <textarea class="iq-input" id="iq-msg" rows="4" placeholder="문의 내용을 적어주세요"></textarea>
      <div class="iq-btns">
        <button class="iq-cancel" type="button" onclick="closeInquiry()">취소</button>
        <button class="iq-send" type="button" onclick="sendInquiry()">보내기 🤍</button>
      </div>
    </div>
  </div>

  <div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-top" id="modal-top"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase.js"></script>
  <script>
    var viewers=[], types=[], counts=[];

    async function init(){
      var p = await getProfile();
      if(p.name){ document.getElementById('foot-copy').textContent = '© 2026 '+p.name+' Official.'; }
      document.getElementById('foot-biz').textContent = '비즈니스 문의 · '+(p.email||'');
      var v = await fetchAll('viewers','sort_order', true);
      var t = await fetchAll('upbo_types','sort_order', true);
      var c = await fetchAll('upbo_counts','id', true);
      viewers = (v === null) ? VIEWERS_DEFAULTS.slice() : v;
      types   = (t === null) ? UPBO_TYPES_DEFAULTS.slice() : t;
      counts  = (c === null) ? UPBO_COUNTS_DEFAULTS.slice() : c;
      var latest = counts.reduce(function(m,x){ return (x.updated_at && x.updated_at > m) ? x.updated_at : m; }, '');
      document.getElementById('update-date').textContent = latest ? ('갱신일: '+latest.slice(0,10)) : '';
      render(viewers); initIframeResize();
    }
    function viewerTotal(vid){
      return counts.filter(function(c){ return c.viewer_id===vid && c.count>0; }).reduce(function(s,c){ return s+c.count; }, 0);
    }
    function render(list){
      var grid = document.getElementById('grid');
      if(!list.length){ grid.innerHTML = '<div class="empty" style="grid-column:1/-1">시청자가 없어요 ✦</div>'; initIframeResize(); return; }
      grid.innerHTML = list.map(function(v){
        var av = soopAvatar(v.soop_id), ini = esc((v.nickname||'?').charAt(0));
        var avHtml = av ? '<img class="viewer-av" src="'+av+'" onerror="this.outerHTML=\'<div class=\\\'viewer-av-fb\\\'>'+ini+'</div>\'">' : '<div class="viewer-av-fb">'+ini+'</div>';
        return '<div class="viewer-card" onclick="openModal('+v.id+')">'+avHtml
          + '<div class="viewer-nick">'+esc(v.nickname)+'</div>'
          + (v.soop_id?'<div class="viewer-id">('+esc(v.soop_id)+')</div>':'<div class="viewer-id">&nbsp;</div>')
          + '<span class="viewer-total">업보 '+viewerTotal(v.id)+'</span></div>';
      }).join('');
      initIframeResize();
    }
    function openModal(vid){
      var v = viewers.find(function(x){ return x.id===vid; }); if(!v) return;
      var av = soopAvatar(v.soop_id), ini = esc((v.nickname||'?').charAt(0));
      var avHtml = av ? '<img class="modal-av" src="'+av+'" onerror="this.outerHTML=\'<div class=\\\'modal-av-fb\\\'>'+ini+'</div>\'">' : '<div class="modal-av-fb">'+ini+'</div>';
      document.getElementById('modal-top').innerHTML = avHtml
        + '<div><div class="modal-nick">'+esc(v.nickname)+'</div>'+(v.soop_id?'<div class="modal-id">('+esc(v.soop_id)+')</div>':'')+'</div>'
        + '<button class="modal-x" onclick="closeModal()">✕</button>';
      var my = {}; counts.filter(function(c){ return c.viewer_id===vid; }).forEach(function(c){ my[c.type_id]=c.count; });
      var rows = types.filter(function(t){ return (my[t.id]||0) > 0; }).map(function(t){
        return '<div class="upbo-row"><span class="nm">'+esc(t.name)+'</span>'
          + (t.category==='이벤트'?'<span class="evt">이벤트</span>':'')
          + '<span class="ct">×'+my[t.id]+'</span></div>';
      }).join('');
      document.getElementById('modal-body').innerHTML = rows || '<div class="modal-empty">아직 업보가 없어요 ♡</div>';
      var ov = document.getElementById('ov'), e = window.event, y = 200;
      if(e){ y = (e.pageY != null ? e.pageY : (e.clientY||0)); }
      ov.style.top = Math.max(10, y - 80) + 'px';
      ov.classList.add('show');
    }
    function closeModal(){ document.getElementById('ov').classList.remove('show'); }

    document.getElementById('search').addEventListener('input', function(e){
      var q = e.target.value.trim().toLowerCase();
      render(viewers.filter(function(v){ return (v.nickname||'').toLowerCase().indexOf(q)>-1 || (v.soop_id||'').toLowerCase().indexOf(q)>-1; }));
    });

    var INQ_PAGE = '업보';
    function openInquiry(){
      var ov=document.getElementById('iq-ov'), e=window.event, y=80;
      if(e){ y=(e.pageY!=null?e.pageY:(e.clientY||0)); }
      ov.style.top = Math.max(10, y-60)+'px';
      ov.classList.add('show');
    }
    function closeInquiry(){ document.getElementById('iq-ov').classList.remove('show'); }
    async function sendInquiry(){
      var nick=document.getElementById('iq-nick').value.trim();
      if(!nick){ alert('닉네임을 적어주세요'); return; }
      var msg=document.getElementById('iq-msg').value.trim();
      if(!msg){ alert('문의 내용을 적어주세요'); return; }
      if(!db){ alert('지금은 미리보기예요. 배포(서버 연결) 후 전송됩니다.'); return; }
      var ok = await insertRow('inquiries', { nickname:nick, message:msg, page:INQ_PAGE });
      if(ok){ alert('문의가 전송됐어요! 🤍'); document.getElementById('iq-nick').value=''; document.getElementById('iq-msg').value=''; closeInquiry(); }
      else alert('전송 실패 ㅠㅠ 잠시 후 다시 시도해주세요');
    }

    initTheme(); init();
  </script>
</body>
</html>
