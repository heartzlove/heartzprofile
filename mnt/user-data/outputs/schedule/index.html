<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 · 하츠</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/op/ophillia/ophillia.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-links">
        <a class="navpill" href="../index.html">프로필</a>
        <a class="navpill active" href="index.html">일정</a>
        <a class="navpill" href="../work/">업보</a>
      </div>
      <button class="theme-switch" id="themeSwitch" type="button" aria-label="다크모드 전환">🌙</button>
    </div>
  </nav>

  <main class="wrap stagger">

    <div style="text-align:center; margin:6px 0 2px;">
      <h1 class="page-title">일정</h1>
      <p class="page-sub">하츠 방송 일정 ✦</p>
    </div>

    <!-- 방송 요일 -->
    <section class="card">
      <h2 class="sec-title"><span class="dot"></span>방송 요일</h2>
      <div class="day-row">
        <span class="day" id="day-0">일</span><span class="day" id="day-1">월</span>
        <span class="day" id="day-2">화</span><span class="day" id="day-3">수</span>
        <span class="day" id="day-4">목</span><span class="day" id="day-5">금</span>
        <span class="day" id="day-6">토</span>
      </div>
      <p class="sched-note" id="sched-note"></p>
    </section>

    <!-- 전체 일정 -->
    <section class="card">
      <h2 class="sec-title"><span class="dot"></span>전체 일정</h2>
      <div id="ev-future-wrap" style="display:none">
        <div class="month-head">📌 다가오는 일정</div>
        <div class="ev-list" id="ev-future"></div>
      </div>
      <div id="ev-past-wrap" style="display:none">
        <div class="month-head">🗓️ 지난 일정</div>
        <div class="ev-list" id="ev-past"></div>
      </div>
      <div class="empty" id="ev-empty" style="display:none">아직 등록된 일정이 없어요 ✦</div>
    </section>

    <footer class="foot">
      <div class="foot-copy" id="foot-copy">© 2026 하츠 · Heartz</div>
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase.js"></script>
  <script>
    function rowHtml(e){
      var t = e.type || '방송';
      var cls = t === '휴방' ? 'off' : (t === '특별' ? 'special' : 'bcast');
      return '<div class="up-row"><span class="up-badge">'+esc(fmtBadge(e.edate))+'</span>'
           + '<span class="up-text">'+esc(e.title)+'</span>'
           + '<span class="ev-tag '+cls+'">'+esc(t)+'</span></div>';
    }
    async function load(){
      var p = await getProfile();
      var days = Array.isArray(p.days) ? p.days.map(String) : [];
      for(var i=0;i<=6;i++){ var c=document.getElementById('day-'+i); if(c) c.className='day'+(days.indexOf(String(i))>-1?' on':''); }
      document.getElementById('sched-note').textContent = p.sched_note || '';
      if(p.name) document.getElementById('foot-copy').textContent = '© 2026 '+p.name+' · '+(p.reading||'');

      var rows = await fetchAll('events','edate', true);
      if(rows === null) rows = EVENTS_DEFAULTS.slice();
      var today = new Date().toISOString().slice(0,10);
      var future = rows.filter(function(e){ return (e.edate||'') >= today; })
                       .sort(function(a,b){ return (a.edate||'').localeCompare(b.edate||''); });
      var past = rows.filter(function(e){ return (e.edate||'') < today; })
                     .sort(function(a,b){ return (b.edate||'').localeCompare(a.edate||''); });
      if(!rows.length){ document.getElementById('ev-empty').style.display=''; return; }
      if(future.length){ document.getElementById('ev-future-wrap').style.display=''; document.getElementById('ev-future').innerHTML = future.map(rowHtml).join(''); }
      if(past.length){ document.getElementById('ev-past-wrap').style.display=''; document.getElementById('ev-past').innerHTML = past.map(rowHtml).join(''); }
    }
    initTheme(); load(); initIframeResize();
  </script>
</body>
</html>
