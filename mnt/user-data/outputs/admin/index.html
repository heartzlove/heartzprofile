<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 · 하츠</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/op/ophillia/ophillia.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="adm-wrap">

    <!-- 로그인 -->
    <div class="adm-login" id="login">
      <div class="lock">🔒</div>
      <h1>하츠 관리자</h1>
      <div class="adm-field"><input type="password" id="pw" placeholder="비밀번호"></div>
      <button class="adm-btn primary" id="loginBtn" style="width:100%">들어가기</button>
      <p class="adm-hint" id="login-hint"></p>
      <p style="margin-top:14px"><a class="adm-back" href="../index.html">← 메인으로</a></p>
    </div>

    <!-- 관리 패널 -->
    <div id="panel" style="display:none">
      <div class="adm-top">
        <h1 class="page-title" style="font-size:30px; margin:0">관리자</h1>
        <div style="display:flex; align-items:center; gap:12px;">
          <button class="theme-switch" id="themeSwitch" type="button" aria-label="다크모드">🌙</button>
          <a class="adm-back" href="../index.html">← 메인으로</a>
        </div>
      </div>

      <div class="adm-tabs">
        <button class="adm-tab active" data-tab="profile" type="button">프로필</button>
        <button class="adm-tab" data-tab="sched" type="button">일정</button>
        <button class="adm-tab" data-tab="vods" type="button">다시보기</button>
        <button class="adm-tab" data-tab="work" type="button">업보</button>
      </div>

      <!-- 프로필 -->
      <div class="adm-panel active" id="tab-profile">
        <div class="card">
          <h2 class="sec-title"><span class="dot"></span>프로필 정보</h2>
          <div class="adm-row2">
            <div class="adm-field"><label>이름</label><input id="f-name"></div>
            <div class="adm-field"><label>영문(읽기)</label><input id="f-reading"></div>
          </div>
          <div class="adm-field"><label>한 줄 소개</label><input id="f-concept"></div>
          <div class="adm-row2">
            <div class="adm-field"><label>데뷔</label><input id="f-debut" placeholder="2025.12.13"></div>
            <div class="adm-field"><label>생일</label><input id="f-birthday" placeholder="06.14"></div>
          </div>
          <div class="adm-row2">
            <div class="adm-field"><label>팬네임</label><input id="f-fan"></div>
            <div class="adm-field"><label>콘텐츠</label><input id="f-content"></div>
          </div>
          <h2 class="sec-title" style="margin-top:8px"><span class="dot"></span>소개 카드</h2>
          <div class="adm-row2">
            <div class="adm-field"><label>모티프</label><input id="f-motif"></div>
            <div class="adm-field"><label>시그니처</label><input id="f-sig"></div>
          </div>
          <div class="adm-row2">
            <div class="adm-field"><label>소속</label><input id="f-agency"></div>
            <div class="adm-field"><label>성격</label><input id="f-personality"></div>
          </div>
          <div class="adm-field"><label>노래</label><input id="f-song"></div>
          <h2 class="sec-title" style="margin-top:8px"><span class="dot"></span>링크 · 기타</h2>
          <div class="adm-field"><label>SOOP 주소</label><input id="f-soop"></div>
          <div class="adm-field"><label>유튜브 주소</label><input id="f-youtube"></div>
          <div class="adm-field"><label>팬카페 주소</label><input id="f-cafe"></div>
          <div class="adm-field"><label>다시보기 페이지 주소 (전체 보기 버튼)</label><input id="f-vodurl"></div>
          <div class="adm-row2">
            <div class="adm-field"><label>SOOP 아이디 (프사 자동)</label><input id="f-soopid" placeholder="ophillia"></div>
            <div class="adm-field"><label>프사 직접 지정 (선택)</label><input id="f-avatar" placeholder="비우면 SOOP 프사"></div>
          </div>
          <div class="adm-save-row"><button class="adm-btn primary" id="save-profile" type="button">저장</button><span class="adm-msg" id="msg-profile"></span></div>
        </div>
      </div>

      <!-- 일정 -->
      <div class="adm-panel" id="tab-sched">
        <div class="card">
          <h2 class="sec-title"><span class="dot"></span>방송 요일</h2>
          <p class="adm-hint" style="margin:0 0 10px">탭해서 켜기/끄기</p>
          <div class="adm-day-toggles" id="day-toggles">
            <button class="adm-day" data-day="0" type="button">일</button>
            <button class="adm-day" data-day="1" type="button">월</button>
            <button class="adm-day" data-day="2" type="button">화</button>
            <button class="adm-day" data-day="3" type="button">수</button>
            <button class="adm-day" data-day="4" type="button">목</button>
            <button class="adm-day" data-day="5" type="button">금</button>
            <button class="adm-day" data-day="6" type="button">토</button>
          </div>
          <div class="adm-field" style="margin-top:14px"><label>일정 안내 문구</label><input id="f-note" placeholder="월·화·수·금 저녁 8시 · 토·일 낮 1시 · 목요일 휴방"></div>
          <div class="adm-save-row"><button class="adm-btn primary" id="save-sched" type="button">저장</button><span class="adm-msg" id="msg-sched"></span></div>
        </div>
        <div class="card" style="margin-top:16px">
          <h2 class="sec-title"><span class="dot"></span>일정 추가</h2>
          <div class="adm-row2">
            <div class="adm-field"><label>날짜</label><input type="date" id="ev-date"></div>
            <div class="adm-field"><label>구분</label><select id="ev-type"><option>방송</option><option>특별</option><option>휴방</option></select></div>
          </div>
          <div class="adm-field"><label>내용</label><input id="ev-title" placeholder="예: 저녁 8시 마인크래프트"></div>
          <button class="adm-btn primary" id="add-ev" type="button">＋ 추가</button>
          <div class="adm-list" id="ev-adm-list"></div>
        </div>
      </div>

      <!-- 다시보기 -->
      <div class="adm-panel" id="tab-vods">
        <div class="card">
          <h2 class="sec-title"><span class="dot"></span>다시보기 추가</h2>
          <div class="adm-field"><label>제목</label><input id="v-title"></div>
          <div class="adm-row2">
            <div class="adm-field"><label>날짜</label><input type="date" id="v-date"></div>
            <div class="adm-field"><label>영상 길이</label><input id="v-dur" placeholder="예: 7:37:35"></div>
          </div>
          <div class="adm-field"><label>영상 주소 (링크)</label><input id="v-link" placeholder="https://..."></div>
          <div class="adm-field"><label>썸네일 이미지 주소 (선택)</label><input id="v-thumb" placeholder="비우면 그라데이션"></div>
          <button class="adm-btn primary" id="add-vod" type="button">＋ 추가</button>
          <p class="adm-hint">썸네일 주소는 SOOP 다시보기에서 썸네일 우클릭 → '이미지 주소 복사'로 가져오면 돼요.</p>
          <div class="adm-list" id="vod-adm-list"></div>
        </div>
      </div>

      <!-- 업보 -->
      <div class="adm-panel" id="tab-work">
        <div class="card">
          <h2 class="sec-title"><span class="dot"></span>업보 추가</h2>
          <div class="adm-field"><label>내용</label><input id="w-title" placeholder="예: 롤 다이아 찍으면 노래방송"></div>
          <div class="adm-row2">
            <div class="adm-field"><label>상태</label><select id="w-status"><option>진행중</option><option>완료</option></select></div>
            <div class="adm-field"><label>메모 (선택)</label><input id="w-note"></div>
          </div>
          <button class="adm-btn primary" id="add-work" type="button">＋ 추가</button>
          <div class="adm-list" id="work-adm-list"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase.js"></script>
  <script>
    (function(){
      // ⚠️ 관리자 비밀번호 — 배포할 때 아래 {{관리자비밀번호}} 를 바꾸세요 (소스에 보이므로 '버리는 비번' 권장)
      var ADMIN_PW = '1234';
      var demo = ADMIN_PW.indexOf('{{') !== -1;

      var login = document.getElementById('login'), panel = document.getElementById('panel');
      document.getElementById('login-hint').textContent = demo ? '데모 비밀번호: admin' : '';
      function doLogin(){
        var v = document.getElementById('pw').value;
        var ok = demo ? (v === 'admin') : (v === ADMIN_PW);
        if(!ok){ alert('비밀번호가 달라요'); return; }
        login.style.display = 'none'; panel.style.display = 'block';
        loadAll();
      }
      document.getElementById('loginBtn').addEventListener('click', doLogin);
      document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key === 'Enter') doLogin(); });

      // 탭
      var tabs = document.querySelectorAll('.adm-tab');
      tabs.forEach(function(t){ t.addEventListener('click', function(){
        tabs.forEach(function(x){ x.classList.remove('active'); });
        document.querySelectorAll('.adm-panel').forEach(function(p){ p.classList.remove('active'); });
        t.classList.add('active');
        document.getElementById('tab-'+t.dataset.tab).classList.add('active');
      }); });

      var PROFILE = {};
      var MAP = { name:'name', reading:'reading', concept:'concept', debut:'debut', birthday:'birthday',
        fan:'fan_name', content:'content', motif:'motif', sig:'signature', agency:'agency',
        personality:'personality', song:'song', soop:'soop', youtube:'youtube', cafe:'cafe',
        vodurl:'vod_url', soopid:'soop_id', avatar:'avatar' };
      function gv(id){ var el=document.getElementById(id); return el ? el.value.trim() : ''; }
      function sv(id,v){ var el=document.getElementById(id); if(el) el.value = (v==null?'':v); }
      function flash(id,msg){ var el=document.getElementById(id); el.textContent=msg; setTimeout(function(){ el.textContent=''; }, 2500); }
      var NEEDS = '저장하려면 supabase.js 에 Supabase 주소·키를 먼저 넣어주세요.';

      async function loadProfileForm(){
        PROFILE = await getProfile();
        for(var k in MAP) sv('f-'+k, PROFILE[MAP[k]]);
        var days = Array.isArray(PROFILE.days) ? PROFILE.days.map(String) : [];
        document.querySelectorAll('.adm-day').forEach(function(b){ b.classList.toggle('on', days.indexOf(b.dataset.day) > -1); });
        sv('f-note', PROFILE.sched_note);
      }
      document.querySelectorAll('.adm-day').forEach(function(b){ b.addEventListener('click', function(){ b.classList.toggle('on'); }); });

      document.getElementById('save-profile').addEventListener('click', async function(){
        for(var k in MAP) PROFILE[MAP[k]] = gv('f-'+k);
        if(await saveProfile(PROFILE)) flash('msg-profile','저장됐어요 ✓'); else alert(NEEDS);
      });
      document.getElementById('save-sched').addEventListener('click', async function(){
        var days=[]; document.querySelectorAll('.adm-day').forEach(function(b){ if(b.classList.contains('on')) days.push(parseInt(b.dataset.day,10)); });
        PROFILE.days = days; PROFILE.sched_note = gv('f-note');
        if(await saveProfile(PROFILE)) flash('msg-sched','저장됐어요 ✓'); else alert(NEEDS);
      });

      async function loadEvents(){
        var rows = await fetchAll('events','edate',true); if(rows===null) rows = EVENTS_DEFAULTS.slice();
        renderList('ev-adm-list', rows, function(e){
          return { title:(fmtBadge(e.edate)||e.edate||'')+'  ·  '+(e.title||''), sub:'구분: '+(e.type||'방송') };
        }, 'events', loadEvents);
      }
      document.getElementById('add-ev').addEventListener('click', async function(){
        var edate=gv('ev-date'), title=gv('ev-title'), type=gv('ev-type')||'방송';
        if(!edate || !title){ alert('날짜와 내용을 적어주세요'); return; }
        if(await insertRow('events',{ edate:edate, title:title, type:type })){ sv('ev-title',''); loadEvents(); } else alert('추가하려면 Supabase를 먼저 연결해주세요.');
      });

      async function loadVods(){
        var rows = await fetchAll('vods','vdate',false); if(rows===null) rows = VODS_DEFAULTS.slice();
        renderList('vod-adm-list', rows, function(v){
          return { title:(v.title||''), sub:(v.vdate||'')+(v.dur?(' · '+v.dur):'')+(v.thumb?' · 썸네일O':' · 썸네일X') };
        }, 'vods', loadVods);
      }
      document.getElementById('add-vod').addEventListener('click', async function(){
        var t=gv('v-title'); if(!t){ alert('제목을 적어주세요'); return; }
        if(await insertRow('vods',{ title:t, vdate:gv('v-date'), dur:gv('v-dur'), link:gv('v-link'), thumb:gv('v-thumb') })){
          ['v-title','v-dur','v-link','v-thumb'].forEach(function(i){ sv(i,''); }); loadVods();
        } else alert('추가하려면 Supabase를 먼저 연결해주세요.');
      });

      async function loadWork(){
        var rows = await fetchAll('work','id',true); if(rows===null) rows = WORK_DEFAULTS.slice();
        renderList('work-adm-list', rows, function(w){
          return { title:(w.title||''), sub:'상태: '+(w.status||'진행중')+(w.note?(' · '+w.note):'') };
        }, 'work', loadWork);
      }
      document.getElementById('add-work').addEventListener('click', async function(){
        var t=gv('w-title'); if(!t){ alert('내용을 적어주세요'); return; }
        if(await insertRow('work',{ title:t, status:gv('w-status')||'진행중', note:gv('w-note') })){ sv('w-title',''); sv('w-note',''); loadWork(); } else alert('추가하려면 Supabase를 먼저 연결해주세요.');
      });

      function renderList(boxId, rows, fmt, table, reload){
        var box=document.getElementById(boxId);
        if(!rows.length){ box.innerHTML='<div class="empty">아직 없어요</div>'; return; }
        box.innerHTML = rows.map(function(r){
          var f=fmt(r);
          return '<div class="adm-item"><div class="ai-main"><div class="ai-title">'+esc(f.title)+'</div><div class="ai-sub">'+esc(f.sub)+'</div></div>'
               + '<button class="adm-btn danger" data-id="'+(r.id!=null?r.id:'')+'" type="button">삭제</button></div>';
        }).join('');
        box.querySelectorAll('.adm-btn.danger').forEach(function(b){
          b.addEventListener('click', async function(){
            var id=b.dataset.id;
            if(!id){ alert('미리보기(미설정) 상태에선 삭제할 수 없어요. Supabase 연결 후 가능합니다.'); return; }
            if(!confirm('삭제할까요?')) return;
            if(await deleteRow(table, id)) reload(); else alert('삭제 실패 (Supabase 연결을 확인하세요)');
          });
        });
      }

      function loadAll(){ loadProfileForm(); loadEvents(); loadVods(); loadWork(); }

      initTheme();
    })();
  </script>
</body>
</html>
