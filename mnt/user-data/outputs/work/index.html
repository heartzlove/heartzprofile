<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업보 · 하츠</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/op/ophillia/ophillia.jpg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-links">
        <a class="navpill" href="../index.html">프로필</a>
        <a class="navpill" href="../schedule/">일정</a>
        <a class="navpill active" href="index.html">업보</a>
      </div>
      <button class="theme-switch" id="themeSwitch" type="button" aria-label="다크모드 전환">🌙</button>
    </div>
  </nav>

  <main class="wrap stagger">

    <div style="text-align:center; margin:6px 0 2px;">
      <h1 class="page-title">업보</h1>
      <p class="page-sub">하츠가 별뭉이들과 한 약속 ✦</p>
    </div>

    <section class="card">
      <div class="work-summary">
        <span class="work-stat">진행중 <b id="cnt-doing">0</b></span>
        <span class="work-stat">완료 <b id="cnt-done">0</b></span>
      </div>
      <div class="work-list" id="work-list"></div>
      <div class="empty" id="work-empty" style="display:none">아직 등록된 업보가 없어요 ✦</div>
    </section>

    <footer class="foot">
      <div class="foot-copy" id="foot-copy">© 2026 하츠 · Heartz</div>
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../supabase.js"></script>
  <script>
    async function load(){
      var p = await getProfile();
      if(p.name) document.getElementById('foot-copy').textContent = '© 2026 '+p.name+' · '+(p.reading||'');

      var rows = await fetchAll('work','id', true);
      if(rows === null) rows = WORK_DEFAULTS.slice();
      var doing=0, done=0;
      rows.forEach(function(w){ if(w.status==='완료') done++; else doing++; });
      document.getElementById('cnt-doing').textContent = doing;
      document.getElementById('cnt-done').textContent = done;

      var list = document.getElementById('work-list');
      if(!rows.length){ document.getElementById('work-empty').style.display=''; return; }
      list.innerHTML = rows.map(function(w, idx){
        var isDone = w.status === '완료';
        var chip = isDone ? '<span class="work-chip done">✓ 완료</span>' : '<span class="work-chip doing">진행중</span>';
        var note = w.note ? '<div class="work-note">'+esc(w.note)+'</div>' : '';
        return '<div class="work-item'+(isDone?' is-done':'')+'">'
             + '<span class="work-num">'+(idx+1)+'</span>'
             + '<div class="work-body"><div class="work-title">'+esc(w.title)+'</div>'+note+'</div>'
             + chip + '</div>';
      }).join('');
    }
    initTheme(); load(); initIframeResize();
  </script>
</body>
</html>
